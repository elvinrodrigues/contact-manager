
services:
  db:
    image: postgres:15
    container_name: contacthub-db
    restart: always
    environment:
      POSTGRES_USER: contacts_app
      POSTGRES_PASSWORD: password
      POSTGRES_DB: contacts_manager
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contacts_app -d contacts_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: contacthub-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: host=db user=contacts_app password=password dbname=contacts_manager sslmode=disable
    env_file:
      - ./backend/.env

volumes:
  postgres_data:

